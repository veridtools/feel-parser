name: Feature Request
description: Request support for a new FEEL construct, builtin function, or API improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to request new language coverage or an API improvement.
  - type: dropdown
    id: feature-type
    attributes:
      label: Type of request
      options:
        - New FEEL construct / syntax
        - New builtin function support
        - New multi-word known name
        - API improvement (parse, safeParse, walk, KNOWN_NAMES)
        - CLI improvement
        - Documentation improvement
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature clearly. Include the FEEL construct, function name, or behavior you need.
      placeholder: |
        e.g. Support for `context merge(c1, c2)` — currently it parses as a generic function call
        but it should be recognised as a known multi-word builtin.
        Or: expose a `positions()` helper that returns all Identifier nodes with their loc.
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example expression (optional)
      description: A FEEL expression that illustrates the request.
      render: text
  - type: textarea
    id: dmn-spec
    attributes:
      label: DMN spec reference (optional)
      description: Section number from the OMG DMN spec if this is a standard feature.
      placeholder: e.g. DMN 1.5 §10.3.4.5
